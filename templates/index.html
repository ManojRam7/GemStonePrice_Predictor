<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemstone Price Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="kicker">Portfolio Project</p>
        <h1>Gemstone Price Predictor</h1>
        <p>
          End-to-end machine learning workflow with robust preprocessing and tuned tree-based regressors.
        </p>
      </section>

      <section class="panel">
        <form action="{{ url_for('predict_datapoint') }}" method="POST" class="grid">
          <label>Carat<input type="number" name="carat" step="0.01" min="0" required /></label>
          <label>Depth<input type="number" name="depth" step="0.01" min="0" required /></label>
          <label>Table<input type="number" name="table" step="0.01" min="0" required /></label>
          <label>X<input type="number" name="x" step="0.01" min="0" required /></label>
          <label>Y<input type="number" name="y" step="0.01" min="0" required /></label>
          <label>Z<input type="number" name="z" step="0.01" min="0" required /></label>

          <label>
            Cut
            <select name="cut" required>
              <option>Fair</option>
              <option>Good</option>
              <option>Very Good</option>
              <option>Premium</option>
              <option selected>Ideal</option>
            </select>
          </label>

          <label>
            Color
            <select name="color" required>
              <option>D</option>
              <option>E</option>
              <option selected>F</option>
              <option>G</option>
              <option>H</option>
              <option>I</option>
              <option>J</option>
            </select>
          </label>

          <label>
            Clarity
            <select name="clarity" required>
              <option>I1</option>
              <option>SI2</option>
              <option>SI1</option>
              <option>VS2</option>
              <option selected>VS1</option>
              <option>VVS2</option>
              <option>VVS1</option>
              <option>IF</option>
            </select>
          </label>

          <button type="submit">Predict Price</button>
        </form>

        {% if results %}
        <div class="result">
          <h2>Estimated Price</h2>
          <p>${{ results }}</p>
        </div>
        {% endif %}

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
      </section>
    </main>
  </body>
</html>
